# EC2 / production-style compose: API image contains only a pre-built JAR (no Maven).
#
# On your build machine (once per release):
#   ./scripts/build-api-jar.sh
#   # or: .\scripts\build-api-jar.ps1
#
# Copy to EC2 (example):
#   scp -r api/release api/Dockerfile.runtime docker-compose.ec2.yml .env user@ec2:/opt/krishisetu/
#
# On EC2:
#   docker compose -f docker-compose.ec2.yml up -d --build
#
# Optional: pull a pre-built image from a registry instead of building on EC2:
#   docker compose -f docker-compose.ec2.yml pull api
#   docker compose -f docker-compose.ec2.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: krishisetu-postgres
    environment:
      POSTGRES_DB: krishisetu
      POSTGRES_USER: krishisetu
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U krishisetu -d krishisetu']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.runtime
    image: krishisetu-api:runtime
    container_name: krishisetu-api
    ports:
      - '8080:8080'
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/krishisetu
      DB_USER: krishisetu
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      AGMARKNET_API_KEY: ${AGMARKNET_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-prod}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 25s
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
